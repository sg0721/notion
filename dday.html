<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700|Montserrat:900">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,800&display=swap">

    
    <title>Count_down</title>

    <style>

        body{
            background-color: white;
        }

        #timer {
            color: #183059;
            text-align: center;
            text-transform: uppercase;
            font-family: 'Lato', sans-serif bold;
            font-size: 10px;
            letter-spacing: 3px;
        }
        
        .days {
            display: inline-block;
            padding: 30px;
            width: 150px;
            background: #FFFFFF;
            fontsize: 10em;
        }
        
        .numbers {
            font-family: 'Inter', sans-serif;
            color: #183059;
            font-size: 10em;
            text-align: center;
        }

    </style>
    
</head>

    
<body>
    
    <div id="timer">
        <div class="days">
            <div id="days" class="numbers "> </div>days</div>    
        </div>
    </div>

</body>

    
<script>
    
    const year = new Date().getFullYear();
    const myDate = new Date('Aug 01, 2026 00:00:00');
    console.log(myDate);

    // countdown
    let timer = setInterval(function() {
    
        // get today's date
        const today = new Date().getTime();
        
        // get the difference
        const diff = myDate - today;
        
        // math
        let days = Math.floor(diff / (1000 * 60 * 60 * 24)+1);
        
        // display
        document.getElementById("days").innerHTML=days

    }, 1);

</script>

    
</html>
