<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700|Montserrat:900">
        
    <title>Count_down</title>

    <style>

        body{
            background-color: white;
        }

        #timer {
            color: #183059;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            font-size: 5em;
            letter-spacing: 3px;
            display: flex;
            justify-content: center;
        }

        .days {
            display: inline-block;
            padding: 50px;
            width: 320px;
            height: 70px;
            border-radius: 20px;
            background: #EEEEEE;
            display: flex;
            justify-content: left;
            align-items: center;
        }
       
        .numbers {
            font-family: 'Montserrat', sans-serif;
            color: #183059;
            font-size: 1.2em;
        }

    </style>
    
</head>

    
<body>
    
    <div id="timer">
        <span class="days">
            <p>D-
                <span id="days" class="numbers"> </span>
            </p>
        </span>
    </div>

</body>

    
<script>
    
    const year = new Date().getFullYear();
    const myDate = new Date('Aug 01, 2026 00:00:00');
    console.log(myDate);

    // countdown
    let timer = setInterval(function() {
    
        // get today's date
        const today = new Date().getTime();
        
        // get the difference
        const diff = myDate - today;
        
        // math
        let days = Math.floor(diff / (1000 * 60 * 60 * 24)+1);
        
        // display
        document.getElementById("days").innerHTML=days

    }, 1);

</script>

    
</html>
